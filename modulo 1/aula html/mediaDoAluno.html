<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media</title>

    <script>
        function media(params) {

            var b1 = document.getElementById('b1').value
            var b2 = document.getElementById('b2').value
            var b3 = document.getElementById('b3').value
            var b4 = document.getElementById('b4').value

            //calculo da média
             var media = (Number(b1) + Number(b2) + Number(b3) + Number(b4)) / 4

            //informa ao usuario a sua media 
            resultado = document.getElementById('resultado').innerHTML = 'A sua media foi de ' + media

            //apresenta ao usuario se esta aprovado ou não
            if (media >= 7) {
                resultado = document.getElementById('resposta').innerHTML = 'você esta aprovado! :)'
            }else if (media < 5) {
                resultado = document.getElementById('resposta').innerHTML = 'Reprovado Estude mais! :('
            } else {
                resultado = document.getElementById('resposta').innerHTML = 'Recuperação!'
            }
        }
    </script>
</head>
<body>
    <h1>Calcule a sua média anual</h1>
    <p>Lembrando que a média para ser aprovado é 7</p>
    <form action="">
        <label">Primeiro bimestre</label><br>
        <input type="text" id="b1"><br>
        <label>segundo bimestre</label><br>
        <input type="text" id="b2"><br>
        <label>Terceiro bimestre</label><br>
        <input type="text" id="b3"><br>
        <label>Quarto bimestre</label><br>
        <input type="text" id="b4"><br><br>

        <input type="button" value="descubra" onclick="media()">
    </form>

    <p id="resultado"></p>
    <h1 id="resposta"></h1>
</body>
</html>
