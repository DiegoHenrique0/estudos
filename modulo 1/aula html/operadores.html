<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        var n1 = 2
        var n2 = 2
        var aprovado = true
        var minimo = 9

        //operadores

        console.log ('Operadores Aritiméticos')
        console.log (n1 + n2)
        console.log (n1 - n2)
        console.log (n1 * n2)
        console.log (n1 / n2)
        console.log (n1 % n2)        
        
        console.log ('Operadores Relacionais')
        console.log (n1 == n2)
        console.log (n1 != n2)
        console.log (n1 > n2)
        console.log (n1 < n2)
        console.log (n1 >= n2)
        console.log (n1 <= n2)
        
        console.log ('Operadores Lógicos')
        console.log (aprovado)
        console.log (!aprovado)
        console.log (n2>8 && n1<=n2) //as duas operacões devem ser satisfazer o (E)
        console.log (n2>8 || n1<=n2) //as duas operacões devem ser satisfazer o (ou)

    </script>


</head>
<body>
    <h1>olá mundo </h1>
</body>
</html>
